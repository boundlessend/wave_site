name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - name: Проверка типов
        run: npx tsc -b
      - name: Self-check правил и движка
        run: |
          node src/game/rules.selfcheck.ts
          node src/game/engine.selfcheck.ts
      - name: Линт
        run: npm run lint
      - name: Сборка
        run: npm run build
